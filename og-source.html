<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box;}
  body{width:1200px;height:630px;overflow:hidden;background:#0a0e14;
    background-image:radial-gradient(820px 520px at 86% -6%,rgba(79,157,255,.18),transparent 60%),radial-gradient(600px 500px at 0% 100%,rgba(56,103,214,.12),transparent 55%);
    color:#e9eff7;font-family:Inter,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:92px;position:relative;}
  .logo{position:absolute;top:70px;right:92px;width:78px;height:78px;border:2.5px solid #4f9dff;border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;color:#4f9dff;font-weight:700;font-size:36px;}
  .mono{font-family:'JetBrains Mono',monospace;color:#4f9dff;font-size:27px;margin-bottom:26px;letter-spacing:1px;}
  h1{font-size:80px;font-weight:800;letter-spacing:-2.5px;line-height:1.04;}
  h1 .hl{color:#4f9dff;}
  p{color:#8593a8;font-size:31px;margin-top:26px;}
  .foot{margin-top:50px;color:#c5d0de;font-family:'JetBrains Mono',monospace;font-size:23px;}
</style></head>
<body>
  <div class="logo">CG</div>
  <div class="mono">carlesgurdiel.com</div>
  <h1>Carles Gurdiel<br><span class="hl">Full-Stack Developer</span></h1>
  <p>AI-powered software &amp; algorithmic trading systems · Zürich</p>
  <div class="foot">Python · TypeScript · React · MetaTrader 5</div>
</body></html>
